<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioinformatics Terminal v11.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>Bioinformatics Section</h1>
            <input type="text" id="student-name" placeholder="Full Name" required>
            <select id="student-region" required>
                <option value="">-- Select Region --</option>
            </select>
            <input type="text" id="student-school" placeholder="School Name" required>
            <button id="start-btn" onclick="startExam()">START EXAM</button>
        </div>
    </div>

    <div id="exam-interface" class="hidden">
        <header>
            <div id="timer-display">90:00</div>
            <div id="user-info"><span id="display-name"></span> | <span id="display-region"></span></div>
            <div style="display: flex; gap: 10px;">
                <button onclick="downloadAnswers()" class="btn-download">Download Backup</button>
                <button id="final-submit-btn" onclick="finalSubmit()" class="btn-submit">SUBMIT EXAM</button>
            </div>
        </header>

        <main>
            <section id="scenario-panel">
                <div class="tab-bar">
                    <button class="tab-btn" onclick="showScenario(1)">Scenario 1</button>
                    <button class="tab-btn" onclick="showScenario(2)">Scenario 2</button>
                    <button class="tab-btn" onclick="showScenario(3)">Scenario 3</button>
                    <button class="tab-btn" onclick="showScenario(4)">Scenario 4</button>
                </div>
                <div id="scenario-content" class="content-area"></div>
            </section>

            <section id="workbench-panel">
                <div class="tool-card">
                    <h3>Bio-Workbench</h3>
                    <textarea id="seq-input" placeholder="Paste DNA/mRNA/Protein sequences here..."></textarea>
                    <div class="button-grid">
                        <button onclick="runTranscription()">DNA→RNA</button>
                        <button onclick="runTranslation()">Translate</button>
                        <button onclick="runSimpleAlignment()" class="btn-tool">Align (%)</button>
                        <button onclick="runPhyloTree()" class="btn-tool">Build Tree</button>
                        <button onclick="runDomainAnalysis()" style="grid-column: span 4; background:#2980b9;">Domain Analysis (EBI API)</button>
                    </div>
                </div>
                <div class="output-container">
                    <pre id="result-display">Analysis output will appear here...</pre>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
